<div class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-blue-800 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="text-6xl mb-3">🌤️</div>
      <h1 class="text-4xl font-bold text-white tracking-tight">WeatherLook</h1>
      <p class="text-blue-300 mt-1 text-sm">Real-time US weather by ZIP code</p>
    </div>

    <!-- Card -->
    <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-6 shadow-2xl">

      <!-- Input -->
      <div class="flex gap-2 mb-4">
        <input
          [(ngModel)]="zip"
          (keydown.enter)="getWeather()"
          maxlength="5"
          inputmode="numeric"
          placeholder="Enter ZIP code"
          class="flex-1 bg-white/20 border border-white/30 text-white placeholder-blue-200 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-white/50"
        />
        <button
          (click)="getWeather()"
          [disabled]="loading"
          class="bg-white text-blue-900 px-6 py-3 rounded-xl font-bold hover:bg-blue-100 disabled:opacity-50 transition"
        >
          {{ loading ? '...' : 'Go' }}
        </button>
      </div>

      <!-- Search History -->
      <div *ngIf="history.length > 0" class="flex flex-wrap gap-2 mb-4">
        <button
          *ngFor="let item of history"
          (click)="getWeather(item.zip)"
          class="bg-white/10 hover:bg-white/20 text-blue-200 text-xs px-3 py-1 rounded-full border border-white/20 transition"
        >
          {{ item.city }} ({{ item.zip }})
        </button>
      </div>

      <!-- Error -->
      <p *ngIf="error" class="text-red-300 text-sm text-center mb-2">{{ error }}</p>

      <!-- Weather Result -->
      <div *ngIf="weather" class="mt-4">

        <!-- City + description -->
        <div class="text-center mb-4">
          <h2 class="text-2xl font-bold text-white">{{ weather.city }}, {{ weather.state }}</h2>
          <p class="text-blue-200 text-sm capitalize mt-1">{{ weather.description }}</p>
        </div>

        <!-- Big temperature + toggle -->
        <div class="text-center mb-6">
          <span class="text-8xl font-thin text-white">{{ getTemp(weather.temp) }}</span>
          <div class="mt-3">
            <button
              (click)="toggleUnit()"
              class="bg-white/20 hover:bg-white/30 text-white text-sm px-4 py-1 rounded-full border border-white/30 transition"
            >
              Switch to {{ isCelsius ? '°F' : '°C' }}
            </button>
          </div>
        </div>

        <!-- Stats grid -->
        <div class="grid grid-cols-3 gap-3">
          <div class="bg-white/10 rounded-2xl p-3 text-center">
            <p class="text-blue-300 text-xs mb-1">Feels Like</p>
            <p class="text-white font-semibold">{{ getTemp(weather.feels) }}</p>
          </div>
          <div class="bg-white/10 rounded-2xl p-3 text-center">
            <p class="text-blue-300 text-xs mb-1">Humidity</p>
            <p class="text-white font-semibold">{{ weather.humidity }}%</p>
          </div>
          <div class="bg-white/10 rounded-2xl p-3 text-center">
            <p class="text-blue-300 text-xs mb-1">Wind</p>
            <p class="text-white font-semibold">{{ weather.wind }} mph</p>
          </div>
        </div>

        <p class="text-blue-300/60 text-xs text-center mt-5">Powered by OpenWeatherMap</p>
      </div>

    </div>
  </div>
</div>
