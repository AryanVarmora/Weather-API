<div class="min-h-screen bg-gradient-to-br from-blue-900 to-blue-500 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">

    <h1 class="text-3xl font-bold text-blue-900 mb-2">Weather App</h1>
    <p class="text-gray-500 mb-6">Enter a US ZIP code to get current weather</p>

    <!-- Input -->
    <div class="flex gap-2 mb-4">
      <input
        [(ngModel)]="zip"
        (keydown.enter)="getWeather()"
        maxlength="5"
        inputmode="numeric"
        placeholder="e.g. 10001"
        class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <button
        (click)="getWeather()"
        [disabled]="loading"
        class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 disabled:opacity-50 transition"
      >
        {{ loading ? 'Loading...' : 'Search' }}
      </button>
    </div>

    <!-- Error -->
    <p *ngIf="error" class="text-red-500 text-sm mb-4">{{ error }}</p>

    <!-- Weather Result -->
    <div *ngIf="weather" class="bg-blue-50 rounded-xl p-6 mt-4">
      <h2 class="text-2xl font-bold text-blue-900">{{ weather.city }}, {{ weather.state }}</h2>
      <p class="text-gray-500 text-sm mb-4">ZIP: {{ zip }}</p>

      <div class="grid grid-cols-3 gap-4 text-center">
        <div class="bg-white rounded-xl p-4 shadow-sm">
          <p class="text-gray-400 text-xs mb-1">Temperature</p>
          <p class="text-2xl font-bold text-blue-700">{{ weather.temp }}°F</p>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm">
          <p class="text-gray-400 text-xs mb-1">Condition</p>
          <p class="text-sm font-semibold text-blue-700">{{ getCondition(weather.code) }}</p>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm">
          <p class="text-gray-400 text-xs mb-1">Wind</p>
          <p class="text-2xl font-bold text-blue-700">{{ weather.wind }}<span class="text-sm"> mph</span></p>
        </div>
      </div>
    </div>

  </div>
</div>
